<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS Docs — 문서 보관함</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11;
    --surface: #17171c;
    --surface2: #1f1f26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e6e0;
    --muted: #7a7870;
    --teal: #1D9E75;
    --teal-dim: rgba(29,158,117,0.1);
    --amber: #EF9F27;
    --amber-dim: rgba(239,159,39,0.1);
    --blue: #378ADD;
    --blue-dim: rgba(55,138,221,0.1);
    --purple: #8B7DD8;
    --purple-dim: rgba(139,125,216,0.1);
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 36px 40px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 36px; height: 36px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .hub-link {
    font-size: 12px; color: var(--muted);
    text-decoration: none; padding: 6px 12px;
    border: 1px solid var(--border2); border-radius: 6px;
    transition: all 0.15s;
  }
  .hub-link:hover { color: var(--text); border-color: var(--teal); }

  /* Search */
  .search-wrap {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 16px;
    max-width: 480px;
    transition: border-color 0.15s;
  }
  .search-box:focus-within { border-color: var(--teal); }
  .search-icon { color: var(--muted); font-size: 16px; flex-shrink: 0; }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 14px; font-family: inherit;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }

  /* Body */
  .body { padding: 32px 40px 80px; max-width: 1000px; }

  /* Category */
  .category { margin-bottom: 40px; }
  .cat-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .cat-count { font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 10px; padding: 1px 8px; }

  /* Doc cards */
  .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .doc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .doc-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 10px 0 0 10px;
  }
  .doc-card.maps::before   { background: var(--teal); }
  .doc-card.cursor::before { background: var(--amber); }
  .doc-card.tools::before  { background: var(--blue); }
  .doc-card.reports::before{ background: var(--purple); }
  .doc-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .doc-card:hover.maps   { border-color: rgba(29,158,117,0.3); }
  .doc-card:hover.cursor { border-color: rgba(239,159,39,0.3); }
  .doc-card:hover.tools  { border-color: rgba(55,138,221,0.3); }
  .doc-card:hover.reports{ border-color: rgba(139,125,216,0.3); }

  .doc-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
  .doc-desc  { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
  .doc-meta  { display: flex; align-items: center; justify-content: space-between; }
  .doc-date  { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .doc-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .badge-maps   { background: var(--teal-dim);   color: var(--teal); }
  .badge-cursor { background: var(--amber-dim);  color: var(--amber); }
  .badge-tools  { background: var(--blue-dim);   color: var(--blue); }
  .badge-reports{ background: var(--purple-dim); color: var(--purple); }

  /* Add new card */
  .doc-card.add-new {
    border: 1px dashed var(--border2);
    display: flex; align-items: center; justify-content: center;
    gap: 8px; min-height: 88px;
    color: var(--muted); font-size: 13px;
    cursor: default;
  }
  .doc-card.add-new::before { display: none; }
  .doc-card.add-new:hover { transform: none; border-color: var(--border2); background: var(--surface); }

  /* Empty state */
  .empty { color: var(--muted); font-size: 13px; padding: 16px 0; }

  /* No results */
  .no-results { display: none; padding: 48px 0; text-align: center; color: var(--muted); }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 14px 40px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-num { font-weight: 700; color: var(--text); font-family: var(--mono); font-size: 13px; }

  @media (max-width: 640px) {
    .header, .search-wrap, .body, .stats-bar { padding-left: 20px; padding-right: 20px; }
    .doc-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">A</div>
    <div>
      <div class="header-title">ATLAS Docs</div>
      <div class="header-sub">문서 보관함 — antonylim-source / work_hub</div>
    </div>
  </div>
  <div class="header-right">
    <a href="../work_hub.html" class="hub-link">← work_hub</a>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat"><span class="stat-num" id="total-count">0</span> 문서</div>
  <div class="stat"><span class="stat-num">4</span> 카테고리</div>
  <div class="stat" id="last-updated-stat" style="display:none"><span class="stat-num" id="last-updated">-</span> 최근 업데이트</div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="문서 검색..." autocomplete="off">
  </div>
</div>

<div class="body">

  <div class="no-results" id="no-results">
    <div style="font-size:24px; margin-bottom:8px;">🔍</div>
    <div>검색 결과가 없습니다</div>
  </div>

  <!-- M.A.P.S. -->
  <div class="category" data-cat="maps">
    <div class="cat-header">
      <div class="cat-dot" style="background:var(--teal)"></div>
      <span class="cat-name">M.A.P.S.</span>
      <span class="cat-count" id="count-maps">0</span>
    </div>
    <div class="doc-grid" id="grid-maps"></div>
  </div>

  <!-- Cursor 가이드 -->
  <div class="category" data-cat="cursor">
    <div class="cat-header">
      <div class="cat-dot" style="background:var(--amber)"></div>
      <span class="cat-name">Cursor 가이드</span>
      <span class="cat-count" id="count-cursor">0</span>
    </div>
    <div class="doc-grid" id="grid-cursor"></div>
  </div>

  <!-- 업무 도구 -->
  <div class="category" data-cat="tools">
    <div class="cat-header">
      <div class="cat-dot" style="background:var(--blue)"></div>
      <span class="cat-name">업무 도구</span>
      <span class="cat-count" id="count-tools">0</span>
    </div>
    <div class="doc-grid" id="grid-tools"></div>
  </div>

  <!-- 보고·회의 -->
  <div class="category" data-cat="reports">
    <div class="cat-header">
      <div class="cat-dot" style="background:var(--purple)"></div>
      <span class="cat-name">보고·회의</span>
      <span class="cat-count" id="count-reports">0</span>
    </div>
    <div class="doc-grid" id="grid-reports"></div>
  </div>

</div>

<script>
// ── 문서 목록 — 여기에 파일 추가 ──────────────────────────────
const DOCS = [
  {
    cat: 'maps',
    title: 'Activity 3 기술 검토서',
    desc: 'Morpheme Laser Cutter 기술 명세, 확정 스택, 난이도 시스템, 개발 로드맵',
    file: 'maps/maps_activity3_tech_review.html',
    date: '2026-06-11',
  },
  {
    cat: 'maps',
    title: 'Antony 업무 최적 Claude 기능',
    desc: '즉시 ROI, 커뮤니케이션, 레버리지 3단계 우선순위 — 문서화, Cursor 프롬프트, 보고 이메일 등',
    file: 'maps/top_features_for_antony.html',
    date: '2026-06-11',
  },
  {
    cat: 'cursor',
    title: '형태소 경계 터치 감지 Cursor 가이드',
    desc: '6단계 프롬프트 — SlashGesture 타입 정의부터 DebugOverlay까지',
    file: 'cursor/morpheme_cursor_prompt_guide.html',
    date: '2026-06-11',
  },
  {
    cat: 'tools',
    title: 'GitHub Publisher',
    desc: 'Claude 대화 → HTML 변환 → GitHub API 자동 push 도구',
    file: 'tools/claude_to_github.html',
    date: '2026-06-11',
  },
];
// ─────────────────────────────────────────────────────────────

function renderAll(filter = '') {
  const q = filter.toLowerCase().trim();
  const cats = ['maps', 'cursor', 'tools', 'reports'];
  let total = 0;
  let anyVisible = false;

  cats.forEach(cat => {
    const grid = document.getElementById('grid-' + cat);
    const items = DOCS.filter(d => {
      if (d.cat !== cat) return false;
      if (!q) return true;
      return d.title.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q);
    });

    grid.innerHTML = '';
    items.forEach(doc => {
      const a = document.createElement('a');
      a.className = `doc-card ${cat}`;
      a.href = doc.file;
      a.innerHTML = `
        <div class="doc-title">${doc.title}</div>
        <div class="doc-desc">${doc.desc}</div>
        <div class="doc-meta">
          <span class="doc-date">${doc.date}</span>
          <span class="doc-badge badge-${cat}">${catLabel(cat)}</span>
        </div>`;
      grid.appendChild(a);
      anyVisible = true;
    });

    // 검색 중 아니면 + 카드 추가
    if (!q) {
      const add = document.createElement('div');
      add.className = 'doc-card add-new';
      add.innerHTML = `<span style="font-size:18px;opacity:.4">+</span><span>문서 추가</span>`;
      grid.appendChild(add);
    }

    document.getElementById('count-' + cat).textContent = items.length;
    document.querySelector(`[data-cat="${cat}"]`).style.display =
      (q && items.length === 0) ? 'none' : 'block';

    total += items.length;
  });

  document.getElementById('total-count').textContent = total;
  document.getElementById('no-results').style.display = (!anyVisible && q) ? 'block' : 'none';
}

function catLabel(cat) {
  return { maps: 'M.A.P.S.', cursor: 'Cursor', tools: 'Tools', reports: 'Reports' }[cat] || cat;
}

// 최근 업데이트 날짜
const dates = DOCS.map(d => d.date).sort().reverse();
if (dates.length) {
  document.getElementById('last-updated').textContent = dates[0];
  document.getElementById('last-updated-stat').style.display = 'flex';
}

document.getElementById('search-input').addEventListener('input', e => {
  renderAll(e.target.value);
});

renderAll();
</script>
</body>
</html>
